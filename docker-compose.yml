services:
  myclaw:
    build: .
    container_name: myclaw
    volumes:
      - ./data:/app/data
      - ./groups:/app/groups
      - ./skills:/app/skills
      # NOTE: Docker socket intentionally NOT mounted.
      # Run MyClaw on the host or use a socket proxy with strict ACLs.
      - ${MYCLAW_WORKSPACE_DIR:-.}:/app/workspace-repo
    env_file: .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
